name: SENTINEL Core Go CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"
          cache: true

      - name: Format check
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/sentinel
